name: Refresh Bluetooth Vendors

on:
  schedule:
    # Sundays at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate src/bluetoothVendors.ts from Bluetooth SIG
        run: npm run codegen:bluetooth-vendors

      - name: Open PR if the file changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: |
            chore(deps): refresh bluetoothVendors from Bluetooth SIG
          title: 'chore(deps): refresh bluetoothVendors from Bluetooth SIG'
          body: |
            Automated weekly refresh of `src/bluetoothVendors.ts` against the
            canonical Bluetooth SIG company-identifiers list.

            Generated by `.github/workflows/refresh-bluetooth-vendors.yml`.
            Re-runs on Sundays at 04:00 UTC.
          branch: chore/refresh-bluetooth-vendors
          delete-branch: true
          add-paths: |
            src/bluetoothVendors.ts
