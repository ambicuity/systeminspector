name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (with warning budget)
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          LINT_EXIT=$?
          set -e
          cat lint-output.txt
          WARNINGS=$(grep -Eo "Found [0-9]+ warnings" lint-output.txt | tail -n 1 | grep -Eo "[0-9]+" || echo "0")
          echo "Biome warnings: $WARNINGS"
          if [ "$WARNINGS" -gt 200 ]; then
            echo "Warning budget exceeded (200)."
            exit 1
          fi
          if [ "$LINT_EXIT" -ne 0 ]; then
            exit "$LINT_EXIT"
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck Tests
        run: npm run typecheck:test

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test

      - name: CI Smoke Tests
        run: npm run test:ci

      - name: Docs Build
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        run: npm run docs:build

  package-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: |
          mkdir package-smoke
          npm pack --pack-destination package-smoke

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: systeminspector-package
          path: package-smoke/*.tgz

  node18-runtime-smoke:
    runs-on: ubuntu-latest
    needs: package-artifact
    steps:
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: systeminspector-package
          path: package-smoke

      - name: Install package in clean project
        run: |
          mkdir runtime-smoke
          cd runtime-smoke
          npm init -y
          npm install --ignore-scripts --no-audit --no-fund ../package-smoke/*.tgz

      - name: Read expected version from package tarball
        id: version
        run: |
          TARBALL=$(ls package-smoke/*.tgz | head -n1)
          VALUE=$(echo "$TARBALL" | sed -E 's|.*-([0-9][^/]+)\.tgz$|\1|')
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Verify CommonJS API
        working-directory: runtime-smoke
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: node -e "const si = require('@ambicuity/systeminspector'); if (si.version() !== process.env.EXPECTED_VERSION || typeof si.cpu !== 'function') process.exit(1);"

      - name: Verify ESM API
        working-directory: runtime-smoke
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: node --input-type=module -e "import * as si from '@ambicuity/systeminspector'; if (si.version() !== process.env.EXPECTED_VERSION || typeof si.cpu !== 'function') process.exit(1);"

      - name: Verify CLI
        working-directory: runtime-smoke
        run: npx --no-install systeminspector --help
